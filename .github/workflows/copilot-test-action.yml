name: copilot-test-action

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'GitHub Models model ID (see "Available models" step output for valid IDs)'
        required: true
        default: 'openai/gpt-4o-mini'
        type: string

permissions:
  models: read

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: List available models from catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching model catalog..."
          CATALOG=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://models.github.ai/catalog/models)

          echo "Available model IDs:"
          echo "$CATALOG" | jq -r '.[].id' 2>/dev/null | sort || {
            echo "Failed to parse catalog. Raw response:"
            echo "$CATALOG"
          }

      - name: Call GitHub Copilot (GitHub Models)
        id: copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ inputs.model }}
        run: |
          echo "Using model: $MODEL"
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Say hello world!\"}]}" \
            https://models.github.ai/inference/chat/completions)

          RESPONSE=$(cat /tmp/response.json)

          echo "HTTP status: $HTTP_CODE"
          echo ""
          echo "Raw response:"
          echo "$RESPONSE"

          echo ""
          echo "Model output:"
          echo "$RESPONSE" | jq -r '.choices[0].message.content'

          [ "$HTTP_CODE" = "200" ] || exit 1
