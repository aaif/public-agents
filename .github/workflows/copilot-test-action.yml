name: copilot-test-action

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'GitHub Models model ID'
        required: true
        default: 'azure-openai/gpt-4o-mini'
        type: choice
        options:
          - azure-openai/gpt-4o-mini
          - azure-openai/gpt-4o
          - azure-openai/gpt-4.1
          - azureml-meta/Llama-3-3-70B-Instruct
          - azureml-mistral/mistral-small-2503

permissions:
  models: read

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Call GitHub Copilot (GitHub Models)
        id: copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ inputs.model }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Say hello world!\"}]}" \
            https://models.github.ai/inference/chat/completions)

          RESPONSE=$(cat /tmp/response.json)

          echo "HTTP status: $HTTP_CODE"
          echo ""
          echo "Raw response:"
          echo "$RESPONSE"

          echo ""
          echo "Model output:"
          echo "$RESPONSE" | jq -r '.choices[0].message.content'

          [ "$HTTP_CODE" = "200" ] || exit 1
