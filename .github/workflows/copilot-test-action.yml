name: copilot-test-action

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'GitHub Models model ID (e.g. openai/gpt-4o-mini)'
        required: true
        default: 'openai/gpt-4o-mini'
        type: choice
        options:
          - openai/gpt-4o-mini
          - openai/gpt-4o
          - openai/gpt-4.1
          - meta/llama-3-70b-instruct
          - mistral-ai/mistral-small

permissions:
  models: read

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Call GitHub Copilot (GitHub Models)
        id: copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ inputs.model }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"$MODEL\", \"messages\": [{\"role\": \"user\", \"content\": \"Say hello world!\"}]}" \
            https://models.github.ai/inference/chat/completions)

          echo "Raw response:"
          echo "$RESPONSE"

          echo ""
          echo "Model output:"
          echo "$RESPONSE" | jq -r '.choices[0].message.content'
